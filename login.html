<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Welcome Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c1210;
            --accent-color: #620cadf4; /* Gold/Yellow accent */
            --text-color: #ffffff;
            --input-bg: #1a201e;
        }

        body { 
            margin: 0; display: flex; height: 100vh; 
            background: radial-gradient(circle at top right, #1a201e, #0c1210); 
            color: var(--text-color); font-family: 'Roboto', sans-serif;
            align-items: center; justify-content: center;
        }

        .login-card {
            display: flex; width: 800px; background: rgba(20, 25, 23, 0.9);
            border-radius: 30px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            align-items: center;
        }

        .form-side { flex: 1; padding-right: 40px; }
        .image-side { flex: 1; display: flex; align-items: center; justify-content: center; }

        h1 { margin-top: 0; font-size: 2.5rem; }

        input { 
            width: 100%; background: var(--input-bg); border: none; 
            padding: 15px; margin: 15px 0; color: white; border-radius: 50px;
            border: 1px solid #333; outline: none; box-sizing: border-box;
        }

        .btn-signin { 
            width: 100%; padding: 15px; background: transparent; 
            border: 2px solid var(--accent-color); color: var(--accent-color);
            border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-signin:hover { background: var(--accent-color); color: black; }

        .panda-art { 
            width: 250px; height: 250px; border-radius: 50%; 
            border: 5px solid var(--accent-color); object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="form-side">
            <h1>WELCOME BACK!</h1>
            <p>Don't have an account? <a href="/signup" style="color: var(--accent-color)">Sign up</a></p>
            
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            
            <button class="btn-signin" onclick="submitLogin()">SIGN IN</button>
        </div>
        
        <div class="image-side">
            <img src="ironman_cutout.png" class="panda-art" alt="Mascot">
        </div>
    </div>

    <script>
        async function submitLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            
            const data = await response.json();
            
            if (response.ok) {
                alert("Login Successful! Token received.");
                // Redirect or store token here
            } else {
                alert("Login failed: " + (data.message || "Invalid credentials"));
            }
        }
    </script>
</body>
</html>
