<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Join the Avengers</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c1210;
            --accent-color: #e23636;
            --text-color: #ffffff;
            --input-bg: #1a201e;
        }

        body {
            margin: 0; display: flex; height: 100vh;
            background: radial-gradient(circle at top left, #1a0a0a, #0c1210);
            color: var(--text-color); font-family: 'Roboto', sans-serif;
            align-items: center; justify-content: center;
        }

        .signup-card {
            display: flex; width: 850px; background: rgba(20, 14, 14, 0.92);
            border-radius: 30px; padding: 50px; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(226, 54, 54, 0.2);
            align-items: center; gap: 50px;
        }

        .image-side {
            flex: 0 0 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-art {
            width: 220px;
            height: 320px;
            object-fit: cover;
            object-position: top;
            border-radius: 20px;
            border: 3px solid var(--accent-color);
            box-shadow: 0 0 30px rgba(226, 54, 54, 0.4);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .form-side {
            flex: 1;
        }

        .brand {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 6px;
            font-family: 'Oswald', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .subtitle a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .subtitle a:hover { text-decoration: underline; }

        .row {
            display: flex;
            gap: 15px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #2a2a2a;
            padding: 14px 18px;
            margin: 8px 0;
            color: white;
            border-radius: 50px;
            outline: none;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        input::placeholder {
            color: #555;
        }

        .btn-signup {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
        }

        .btn-signup:hover {
            background: #c0272b;
            box-shadow: 0 5px 20px rgba(226, 54, 54, 0.5);
            transform: translateY(-1px);
        }

        .error-msg {
            color: var(--accent-color);
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <div class="image-side">
            <img src="scarlet_witch_cutout.png" class="hero-art" alt="Hero">
        </div>

        <div class="form-side">
            <p class="brand">MARVEL ACCESS</p>
            <h1>JOIN THE TEAM</h1>
            <p class="subtitle">Already have an account? <a href="/login">Sign in</a></p>

            <div class="row">
                <input type="text" id="first-name" placeholder="First Name">
                <input type="text" id="last-name" placeholder="Last Name">
            </div>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <input type="password" id="confirm-password" placeholder="Confirm Password">

            <button class="btn-signup" onclick="submitSignup()">CREATE ACCOUNT</button>
            <p class="error-msg" id="error-msg"></p>
        </div>
    </div>

    <script>
        async function submitSignup() {
            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');

            errorMsg.textContent = '';

            if (!firstName || !lastName || !email || !password) {
                errorMsg.textContent = 'Please fill in all fields.';
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters.';
                return;
            }

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message || 'Sign up failed. Please try again.';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
            }
        }
    </script>
</body>
</html>
